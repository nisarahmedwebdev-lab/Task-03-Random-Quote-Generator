<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Quote Generator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Random Quote Generator</h1>

  <div class="quote-container">
    <div class="quote-box">
      <div id="quote-wrapper" class="fade-text">
        <p class="quote-text">“<span id="text"></span>”</p>
        <p class="quote-author">— <span id="author"></span></p>
      </div>
    </div>

    <div class="controls">
      <div id="toast" class="toast">Copied!</div>
      <button id="new-quote-btn" class="btn-primary">
        <i class="bi bi-arrow-clockwise"></i> New Quote
      </button>
      <button id="copy-btn" class="btn-secondary">
        <i class="bi bi-copy"></i> Copy
      </button>
      <a id="tweet-btn" class="btn-secondary tweet-link" target="_blank" rel="noopener noreferrer">
        <i class="bi bi-twitter-x"></i> Tweet
      </a>
      <button id="fav-btn" class="btn-secondary btn-fav">
        <i id="fav-icon" class="bi bi-star"></i> Favourite
      </button>
    </div>
  </div>

  <div class="favorites-container">
    <h2>Your Favourites</h2>
    <ul id="favorites-list" class="favorites-list"></ul>
  </div>

  <script src="script.js"></script>
</body>

</html>
